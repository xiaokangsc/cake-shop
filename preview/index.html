<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cake-甜也（佳妮）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#faf7f4;max-width:430px;margin:0 auto;min-height:100vh;color:#3d2c2c}
:root{--rose:#C8827A;--cream:#FAF7F4;--white:#FFF;--text:#3d2c2c;--text-light:#9B8E8A;--border:#F0E8E4}
.top{background:var(--white);padding:12px 16px;text-align:center;font-family:Georgia,serif;font-size:18px;letter-spacing:4px;color:#5C3D3A;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.banner{width:100%;height:200px;position:relative;overflow:hidden}
.banner img{width:100%;height:100%;object-fit:cover}
.section{padding:16px}
.section h3{font-size:16px;margin-bottom:12px;color:#5C3D3A}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{background:var(--white);border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.card:active{transform:scale(.97)}
.card-img{width:100%;height:170px;object-fit:cover;background:linear-gradient(135deg,#fdf6f2,#faf0eb)}
.card-info{padding:12px}
.card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sold{font-size:10px;color:var(--text-light);margin:4px 0}
.card-price{color:#D4655A;font-size:18px;font-weight:700}
.card-price::before{content:'¥';font-size:.65em}
.tabs{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--white);display:flex;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);z-index:300}
.tab{flex:1;text-align:center;padding:6px 0;cursor:pointer;font-size:10px;color:var(--text-light)}
.tab.active{color:var(--rose)}
.tab svg{display:block;margin:0 auto 2px}
.toast{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(60,44,44,.85);color:#fff;padding:10px 22px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:opacity.25s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="top">Cake-甜也（佳妮）</div>
<div class="banner" id="banner"><img src="/static/images/banners/banner5.jpg" onerror="this.style.display='none'" style="height:200px"></div>
<div class="section"><h3>全部产品</h3><div class="grid" id="grid">加载中...</div></div>

<div class="tabs">
  <div class="tab active" onclick="location.reload()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>首页</div>
  <div class="tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>点单</div>
  <div class="tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 12v7a1 1 0 01-1 1H5a1 1 0 01-1-1v-7"/><polyline points="16 7 12 3 8 7"/><line x1="12" y1="3" x2="12" y2="15"/></svg>积分</div>
  <div class="tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>购物车</div>
  <div class="tab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>我的</div>
</div>
<div class="toast" id="toast"></div>

<script>
var API='/api';
function t(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},1500)}

async function load(){
  try{
    var r=await fetch(API+'/products/list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page_size:50})});
    var d=await r.json();
    if(d.code!==0){t(d.msg||'加载失败');return}
    var list=d.data.list;
    var html='';
    for(var i=0;i<list.length;i++){
      var p=list[i];
      var imgs=typeof p.images==='string'?JSON.parse(p.images):(p.images||[]);
      html+='<div class="card"><div class="card-img" style="background:linear-gradient(135deg,#fdf6f2,#faf0eb)"></div><div class="card-info"><div class="card-name">'+p.name+'</div><div class="card-sold">已售 '+p.sales+'</div><div class="card-price">'+p.price+'</div></div></div>';
    }
    document.getElementById('grid').innerHTML=html||'暂无产品';
    t('加载完成: '+list.length+' 款蛋糕');
  }catch(e){
    t('网络错误: '+e.message);
    document.getElementById('grid').innerHTML='<div style="text-align:center;padding:40px;color:#999">网络错误，请检查服务是否启动</div>';
  }
}
load();
</script>
</body>
</html>
